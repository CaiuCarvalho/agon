server {
    listen 80;
    server_name agonimports.com www.agonimports.com;

    # Next.js App
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # API (opcional, se necessário)
    location /api {
        proxy_pass http://localhost:3333;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Logs
    access_log /var/log/nginx/agon-access.log;
    error_log /var/log/nginx/agon-error.log;
}

# --- Staging ---------------------------------------------------------------
# Served from the same VPS; Next.js listens on port 30001 via
# PM2 process `agon-web-staging`. SSL cert issued separately for the
# subdomain. See CLAUDE.md "Ambientes" for the full layout.

server {
    listen 80;
    server_name staging.agonimports.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name staging.agonimports.com;

    ssl_certificate /etc/letsencrypt/live/staging.agonimports.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.agonimports.com/privkey.pem;

    location / {
        proxy_pass http://localhost:30001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    access_log /var/log/nginx/agon-staging-access.log;
    error_log /var/log/nginx/agon-staging-error.log;
}
