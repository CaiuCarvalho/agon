name: Deploy to Staging

on:
  push:
    branches: [staging]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Aplica migrações Supabase antes do deploy.
      # Roda SOMENTE se STAGING_SUPABASE_DB_PASSWORD estiver presente.
      # Se o secret não estiver configurado, o passo é pulado e o restante
      # do deploy continua normal (aplicação manual via Dashboard segue sendo
      # o fallback, como documentado em supabase/ALL_MIGRATIONS_BUNDLE.sql).
      - name: Check Supabase migration secrets
        id: check_supabase_secrets
        env:
          DB_PASSWORD: ${{ secrets.STAGING_SUPABASE_DB_PASSWORD }}
          PROJECT_REF: ${{ secrets.STAGING_SUPABASE_PROJECT_REF }}
        run: |
          if [ -n "$DB_PASSWORD" ] && [ -n "$PROJECT_REF" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Supabase migrations step skipped — STAGING_SUPABASE_DB_PASSWORD e/ou STAGING_SUPABASE_PROJECT_REF não configurados."
          fi

      - name: Setup Supabase CLI
        if: steps.check_supabase_secrets.outputs.enabled == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply Supabase migrations (staging)
        if: steps.check_supabase_secrets.outputs.enabled == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.STAGING_SUPABASE_DB_PASSWORD }}
          PROJECT_REF: ${{ secrets.STAGING_SUPABASE_PROJECT_REF }}
        run: |
          supabase link --project-ref "$PROJECT_REF"
          supabase db push --linked

      - name: Build .env.local (staging)
        run: |
          cat > env.staging <<'EOF'
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.STAGING_NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.STAGING_NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
          MERCADOPAGO_ACCESS_TOKEN=${{ secrets.STAGING_MERCADOPAGO_ACCESS_TOKEN }}
          MERCADOPAGO_WEBHOOK_SECRET=${{ secrets.STAGING_MERCADOPAGO_WEBHOOK_SECRET }}
          NEXT_PUBLIC_APP_URL=https://staging.agonimports.com
          NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME=${{ secrets.NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
          NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET=${{ secrets.NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET }}
          EOF

      - name: Copy .env to VPS (staging)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: env.staging
          target: /var/www/agon/staging/apps/web/

      - name: Run deploy on VPS (staging)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            git config --global --add safe.directory /var/www/agon/staging
            cd /var/www/agon/staging/apps/web
            mv env.staging .env.local
            chmod 600 .env.local
            cd /var/www/agon/staging
            bash deploy-staging.sh

      - name: Health check (staging)
        run: |
          for i in $(seq 1 10); do
            if curl -fsS "https://staging.agonimports.com/api/health" > /dev/null; then
              echo "Staging no ar"
              exit 0
            fi
            echo "Aguardando staging subir... ($i/10)"
            sleep 6
          done
          echo "Health check falhou"
          exit 1
