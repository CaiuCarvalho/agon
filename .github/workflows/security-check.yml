name: Security Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  environment-validation:
    name: Validate Environment Config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check .env.example exists
        run: |
          if [ ! -f .env.example ]; then
            echo ".env.example file is missing"
            exit 1
          fi

      - name: Verify .gitignore excludes .env files
        run: |
          if ! grep -q "^\.env$" .gitignore; then
            echo ".gitignore does not exclude .env files"
            exit 1
          fi

      - name: Check for committed .env files
        run: |
          if git ls-files | grep -E "\.env$|\.env\.local$|\.env\.production$"; then
            echo "Found committed .env files"
            exit 1
          fi
