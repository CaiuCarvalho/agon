name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # `supabase db push --project-ref` foi removido da CLI; o novo fluxo é
      # `supabase link --project-ref` + `supabase db push --linked`, que exige
      # SUPABASE_DB_PASSWORD. O passo só roda se o secret estiver configurado
      # — caso contrário, pula e o deploy continua (migrações podem ser
      # aplicadas manualmente via supabase/ALL_MIGRATIONS_BUNDLE.sql).
      - name: Check Supabase migration secrets
        id: check_supabase_secrets
        env:
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          if [ -n "$DB_PASSWORD" ] && [ -n "$PROJECT_REF" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Supabase migrations step skipped — SUPABASE_DB_PASSWORD e/ou SUPABASE_PROJECT_ID não configurados."
          fi

      - name: Setup Supabase CLI
        if: steps.check_supabase_secrets.outputs.enabled == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply Supabase migrations (production)
        if: steps.check_supabase_secrets.outputs.enabled == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          supabase link --project-ref "$PROJECT_REF"
          supabase db push --linked

      - name: Build .env.local
        run: |
          cat > env.prod <<'EOF'
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MERCADOPAGO_ACCESS_TOKEN=${{ secrets.MERCADOPAGO_ACCESS_TOKEN }}
          MERCADOPAGO_WEBHOOK_SECRET=${{ secrets.MERCADOPAGO_WEBHOOK_SECRET }}
          NEXT_PUBLIC_APP_URL=https://agonimports.com
          NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME=${{ secrets.NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
          NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET=${{ secrets.NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET }}
          EOF

      - name: Copy .env to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: env.prod
          target: /var/www/agon/app/apps/web/

      - name: Run deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            git config --global --add safe.directory /var/www/agon/app
            cd /var/www/agon/app/apps/web
            mv env.prod .env.local
            chmod 600 .env.local
            cd /var/www/agon/app
            bash deploy.sh

      - name: Health check
        run: |
          for i in $(seq 1 10); do
            if curl -fsS "${{ secrets.HEALTHCHECK_URL }}" > /dev/null; then
              echo "Site no ar"
              exit 0
            fi
            echo "Aguardando app subir... ($i/10)"
            sleep 6
          done
          echo "Health check falhou"
          exit 1
